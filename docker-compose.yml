services:
  mysql:
    image: mysql:8.0
    container_name: vacation_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vacation_db
      MYSQL_USER: vacation_user
      MYSQL_PASSWORD: vacation_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    container_name: vacation_app
    ports:
      - "8501:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: vacation_db
      DB_USER: vacation_user
      DB_PASSWORD: vacation_pass
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FLASK_DEBUG: "1"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./app.py:/app/app.py
      - ./db.py:/app/db.py
      - ./i18n.py:/app/i18n.py
      - ./translations:/app/translations
      - ./danish_holidays.py:/app/danish_holidays.py
      - ./migrate.py:/app/migrate.py
      - ./migrations:/app/migrations
      - ./templates:/app/templates

volumes:
  mysql_data:
