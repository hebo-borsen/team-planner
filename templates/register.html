{% extends "base.html" %}
{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-6">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6">Create Account</h1>

        <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
            <form method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Shortname</label>
                    <input type="text" name="shortname" required autofocus placeholder="bcda"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Full name</label>
                    <input type="text" name="display_name" required placeholder="John Smith"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" name="email" placeholder="john.smith@borsen.dk"
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Font</label>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">The font your name should be written in</p>
                    <select name="font" id="font-select"
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">-- Select a font --</option>
                        {% for f in [
                            'Abril Fatface', 'Amatic SC', 'Audiowide', 'Bangers', 'Baumans',
                            'Black Ops One', 'Bowlby One SC', 'Bungee', 'Bungee Inline', 'Bungee Shade',
                            'Butcherman', 'Cabin Sketch', 'Caesar Dressing', 'Caveat', 'Ceviche One',
                            'Cherry Bomb One', 'Cinzel Decorative', 'Coiny', 'Comforter', 'Concert One',
                            'Covered By Your Grace', 'Creepster', 'Cute Font', 'Dancing Script', 'Dokdo',
                            'Eater', 'Fascinate Inline', 'Faster One', 'Finger Paint', 'Flamenco',
                            'Flavors', 'Fontdiner Swanky', 'Freckle Face', 'Fredericka the Great', 'Frijole',
                            'Fugaz One', 'Gaegu', 'Geostar Fill', 'Glass Antiqua', 'Gloria Hallelujah',
                            'Gorditas', 'Graduate', 'Gravitas One', 'Griffy', 'Gugi',
                            'Henny Penny', 'Hi Melody', 'Homemade Apple', 'Honk', 'Iceberg',
                            'Irish Grover', 'Jacques Francois Shadow', 'Jolly Lodger', 'Joti One', 'Julee',
                            'Kavoon', 'Kirang Haerang', 'Kumar One Outline', 'Lacquer', 'Lakki Reddy',
                            'Lobster', 'Love Ya Like A Sister', 'Luckiest Guy', 'Megrim', 'Metal Mania',
                            'Miltonian Tattoo', 'Modak', 'Monoton', 'Mystery Quest', 'Nabla',
                            'Nerko One', 'Nosifer', 'Oi', 'Orbitron', 'Pacifico',
                            'Palette Mosaic', 'Permanent Marker', 'Piedra', 'Pirata One', 'Plaster',
                            'Poiret One', 'Potta One', 'Press Start 2P', 'Rampart One', 'Rock Salt',
                            'Rubik Bubbles', 'Rubik Moonrocks', 'Rye', 'Sacramento', 'Satisfy',
                            'Shadows Into Light', 'Shrikhand', 'Silkscreen', 'Smokum', 'Special Elite',
                            'Srisakdi', 'Stalinist One', 'UnifrakturMaguntia', 'Vast Shadow', 'Wallpoet'
                        ] %}
                        <option value="{{ f }}" style="font-family: '{{ f }}', cursive;">{{ f }}</option>
                        {% endfor %}
                    </select>
                    <div id="font-preview" class="mt-2 px-3 py-2 text-lg text-center rounded border border-dashed border-gray-300 dark:border-gray-600 text-gray-400 dark:text-gray-500 hidden">
                        Preview
                    </div>
                </div>
                <script>
                    document.getElementById('font-select').addEventListener('change', function() {
                        var preview = document.getElementById('font-preview');
                        var nameInput = document.querySelector('input[name="display_name"]');
                        if (this.value) {
                            preview.style.fontFamily = "'" + this.value + "', cursive";
                            preview.textContent = nameInput.value || 'Your Name Here';
                            preview.classList.remove('hidden', 'text-gray-400', 'dark:text-gray-500');
                            preview.classList.add('text-gray-900', 'dark:text-gray-100');
                        } else {
                            preview.classList.add('hidden');
                        }
                    });
                    document.querySelector('input[name="display_name"]').addEventListener('input', function() {
                        var preview = document.getElementById('font-preview');
                        var fontSelect = document.getElementById('font-select');
                        if (fontSelect.value && this.value) {
                            preview.textContent = this.value;
                        }
                    });
                </script>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Confirm Password</label>
                    <input type="password" name="confirm" required
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <button type="submit"
                        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg">
                    Register
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
            Already have an account? <a href="/login" class="text-blue-600 dark:text-blue-400 hover:underline">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
