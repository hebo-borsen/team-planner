{% extends "base.html" %}
{% block nav %}{% endblock %}

{% block content %}
<div class="flex justify-center mt-12 mb-2">
    <button id="theme-toggle" title="Toggle theme"
            class="inline-flex items-center gap-0.5 px-1.5 py-1 rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-700 select-none cursor-pointer">
        <span class="theme-sun px-1 rounded bg-amber-200 dark:bg-transparent dark:opacity-50">☀</span>
        <span class="theme-moon px-1 rounded bg-transparent opacity-50 dark:bg-indigo-500 dark:text-white dark:opacity-100">☾</span>
    </button>
</div>

<h1 class="text-2xl font-bold text-center mb-6">{{ _('Create Account') }}</h1>

<div class="max-w-sm mx-auto bg-white dark:bg-gray-800 shadow rounded-lg p-6">
    <form method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Shortname') }}</label>
            <input type="text" name="shortname" required autofocus placeholder="bcda"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Full name') }}</label>
            <input type="text" name="display_name" required placeholder="John Smith"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Email') }}</label>
            <input type="email" name="email" placeholder="john.smith@borsen.dk"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
        </div>
        {% if departments %}
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Department') }}</label>
            <select name="department_id"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
                <option value="">{{ _('-- Select department --') }}</option>
                {% for did, dname, dsort, dfun in departments %}
                <option value="{{ did }}">{{ dname }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Password') }}</label>
            <input type="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">{{ _('Confirm Password') }}</label>
            <input type="password" name="confirm" required
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-borsen-red focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full py-2 px-4 bg-borsen-red hover:bg-borsen-red-dark text-white font-medium rounded-lg">
            {{ _('Register') }}
        </button>
    </form>
</div>

<p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
    {{ _('Already have an account?') }} <a href="/login" class="text-borsen-red dark:text-red-400 hover:underline">{{ _('Log in') }}</a>
</p>
{% endblock %}
