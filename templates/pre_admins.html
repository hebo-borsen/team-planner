{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-2">Pre-admins</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
        Users who register with one of these emails will automatically become admins.
        One email per line.
    </p>

    <form method="post" class="space-y-4">
        <textarea name="emails" rows="10"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm font-mono"
                  placeholder="boss@borsen.dk&#10;another@borsen.dk">{{ emails|join('\n') }}</textarea>
        <button type="submit"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm">
            Save
        </button>
    </form>
</div>
{% endblock %}
