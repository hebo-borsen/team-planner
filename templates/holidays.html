{% extends "base.html" %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Manage Holidays</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <h2 class="text-lg font-semibold mb-3">Add Holiday</h2>
        <form method="post" action="/holidays" class="space-y-3">
            <div>
                <label class="block text-sm font-medium mb-1">Holiday Name</label>
                <input type="text" name="holiday_name" required placeholder="e.g., Christmas"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Date</label>
                <input type="date" name="holiday_date" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">End Date (optional, for range)</label>
                <input type="date" name="end_date"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm">
            </div>
            <button type="submit"
                    class="px-4 py-2 bg-borsen-red hover:bg-borsen-red-dark text-white text-sm font-medium rounded-lg">
                Add Holiday
            </button>
        </form>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <h2 class="text-lg font-semibold mb-3">Holidays</h2>
        <div id="holiday-list">
            {% include "partials/_holiday_list.html" %}
        </div>
    </div>
</div>
{% endblock %}
