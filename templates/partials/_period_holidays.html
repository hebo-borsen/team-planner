{% if holidays %}
<table class="w-full text-sm">
    <thead>
        <tr class="border-b border-gray-200 dark:border-gray-700">
            <th class="text-left py-2 font-medium">Holiday</th>
            <th class="text-left py-2 font-medium">Date</th>
            <th class="text-left py-2 font-medium">Day</th>
            <th class="text-center py-2 font-medium">Enabled</th>
        </tr>
    </thead>
    <tbody>
        {% for hid, hname, hdate, henabled in holidays %}
        <tr class="border-b border-gray-100 dark:border-gray-800 {{ 'opacity-50' if not henabled else '' }}">
            <td class="py-2.5">{{ hname }}</td>
            <td class="py-2.5">
                <span class="date-display cursor-pointer hover:text-blue-600 dark:hover:text-blue-400"
                      onclick="var i=this.nextElementSibling; this.classList.add('hidden'); i.classList.remove('hidden'); i.focus();">
                    {{ hdate|fmtdate }}
                </span>
                <input type="date" name="holiday_date" value="{{ hdate.strftime('%Y-%m-%d') }}"
                       hx-post="/settings/holidays/{{ hid }}/date"
                       hx-target="#holiday-list" hx-swap="innerHTML"
                       class="hidden px-2 py-1 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-sm"
                       onblur="if(!this.dataset.changed){this.classList.add('hidden'); this.previousElementSibling.classList.remove('hidden');}"
                       onchange="this.dataset.changed='1';">
            </td>
            <td class="py-2.5 text-gray-600 dark:text-gray-400">{{ hdate.strftime('%A') }}</td>
            <td class="py-2.5 text-center">
                <button hx-post="/settings/holidays/{{ hid }}/toggle"
                        hx-target="#holiday-list" hx-swap="innerHTML"
                        class="w-10 h-6 rounded-full relative inline-flex items-center transition-colors
                               {{ 'bg-blue-600' if henabled else 'bg-gray-300 dark:bg-gray-600' }}">
                    <span class="w-4 h-4 rounded-full bg-white shadow transform transition-transform
                                 {{ 'translate-x-5' if henabled else 'translate-x-1' }}"></span>
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-sm text-gray-500 dark:text-gray-400 py-4">No holidays found for this period.</p>
{% endif %}
