{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-red-600 dark:text-red-400 mb-4">{{ _('Something went wrong') }}</h1>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-lg font-semibold">{{ _('Error Details') }}</h2>
            <button onclick="copyError()" id="copy-btn"
                    class="px-3 py-1.5 text-sm font-medium rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600"
                    data-copied="{{ _('Copied!') }}" data-default="{{ _('Copy error') }}">
                {{ _('Copy error') }}
            </button>
        </div>
        <pre id="error-text" class="bg-gray-50 dark:bg-gray-900 rounded p-4 text-sm overflow-x-auto whitespace-pre-wrap break-words text-red-700 dark:text-red-300">{{ error }}</pre>
    </div>
</div>

<script>
function copyError() {
    var text = document.getElementById('error-text').textContent;
    navigator.clipboard.writeText(text).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = btn.dataset.copied;
        setTimeout(function() { btn.textContent = btn.dataset.default; }, 2000);
    });
}
</script>
{% endblock %}
